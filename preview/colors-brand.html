<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pd-bg);font-family:var(--pd-font);padding:22px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--pd-r-md);overflow:hidden;border:1px solid var(--pd-line);background:var(--pd-white);box-shadow:var(--pd-shadow-sm);}
  .chip{height:74px;}
  .meta{padding:10px 12px;}
  .name{font-weight:700;font-size:13px;color:var(--pd-ink);}
  .hex{font-size:12px;color:var(--pd-muted);letter-spacing:.02em;margin-top:2px;}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--pd-red)"></div><div class="meta"><div class="name">Brand Red</div><div class="hex">#DE2931</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--pd-red-deep)"></div><div class="meta"><div class="name">Red Deep</div><div class="hex">#C01620 · hover</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--pd-red-soft)"></div><div class="meta"><div class="name">Red Soft</div><div class="hex">#FBEAEA · tint</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--pd-navy)"></div><div class="meta"><div class="name">Navy / Indigo</div><div class="hex">#392F6D · lockup</div></div></div>
  </div>
</body>
</html>
