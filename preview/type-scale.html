<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pd-bg);font-family:var(--pd-font);padding:22px 26px;}
  table{width:100%;border-collapse:collapse;}
  td{padding:7px 0;border-bottom:1px solid var(--pd-line);vertical-align:baseline;}
  .tok{font-weight:700;color:var(--pd-ink);font-size:13px;width:90px;}
  .spec{color:var(--pd-muted);font-size:12px;width:150px;}
  .samp{color:var(--pd-ink);text-align:right;}
</style>
</head>
<body>
  <table>
    <tr><td class="tok">h1</td><td class="spec">800 · 84px · −.02em</td><td class="samp" style="font-weight:800;font-size:30px;letter-spacing:-.02em;">Груз</td></tr>
    <tr><td class="tok">h2</td><td class="spec">800 · 60px</td><td class="samp" style="font-weight:800;font-size:24px;">Факты</td></tr>
    <tr><td class="tok">h3</td><td class="spec">700 · 22px</td><td class="samp" style="font-weight:700;font-size:19px;">Склад в Китае</td></tr>
    <tr><td class="tok">stat</td><td class="spec">800 · 34px</td><td class="samp" style="font-weight:800;font-size:22px;">1 200+</td></tr>
    <tr><td class="tok">lead</td><td class="spec">400 · 19px</td><td class="samp" style="font-size:16px;color:var(--pd-ink-2)">Доводим до результата</td></tr>
    <tr><td class="tok">body</td><td class="spec">400 · 16px</td><td class="samp" style="font-size:14px;color:var(--pd-muted)">Контроль и расчёт</td></tr>
    <tr><td class="tok">eyebrow</td><td class="spec">700 · 14px · .14em</td><td class="samp" style="font-size:12px;letter-spacing:.12em;color:var(--pd-red);font-weight:700;">УСЛУГИ PANDAO</td></tr>
  </table>
</body>
</html>
