<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pd-bg);font-family:var(--pd-font);padding:22px;display:flex;justify-content:center;}
  .panel{background:var(--pd-dark);border-radius:var(--pd-r-lg);padding:22px 26px;width:520px;color:#fff;}
  .route{font-size:18px;font-weight:600;}
  .route .ar{color:var(--pd-red);}
  .cities{font-size:13px;color:var(--pd-on-dark-mut);margin-top:4px;}
  .steps{display:flex;align-items:flex-start;justify-content:space-between;margin-top:22px;}
  .step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;position:relative;}
  .dot{width:42px;height:42px;border-radius:50%;background:var(--pd-dark-2);display:flex;align-items:center;justify-content:center;z-index:2;}
  .dot svg{width:20px;height:20px;color:var(--pd-on-dark-mut);stroke-width:1.9;}
  .step.active .dot{background:var(--pd-red);}
  .step.active .dot svg{color:#fff;}
  .step.done .dot svg{color:var(--pd-red);}
  .lab{font-size:11px;color:var(--pd-on-dark-mut);text-align:center;}
  .step.active .lab{color:#fff;}
  .line{position:absolute;top:21px;left:50%;width:100%;height:2px;background:var(--pd-dark-line);z-index:1;}
  .step.active .line{background:var(--pd-red);}
</style>
</head>
<body>
  <div class="panel">
    <div class="route">Маршрут: <span class="ar">Китай</span> → Северный Кавказ</div>
    <div class="cities">Грозный · Пятигорск · Махачкала · Минеральные Воды</div>
    <div class="steps">
      <div class="step active"><div class="line"></div><div class="dot"><i data-lucide="warehouse"></i></div><div class="lab">Склад в Китае</div></div>
      <div class="step"><div class="line"></div><div class="dot"><i data-lucide="truck"></i></div><div class="lab">Транспортировка</div></div>
      <div class="step"><div class="line"></div><div class="dot"><i data-lucide="scan-line"></i></div><div class="lab">Таможня</div></div>
      <div class="step"><div class="dot"><i data-lucide="check"></i></div><div class="lab">Доставка</div></div>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
