<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pd-bg);font-family:var(--pd-font);padding:26px 28px;}
  .stack{display:flex;flex-direction:column;gap:16px;}
  .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--pd-faint);margin-bottom:5px;}
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="lbl">Eyebrow · 700 · uppercase</div>
      <div class="pd-eyebrow">ФАКТЫ PANDAO</div>
    </div>
    <div>
      <div class="lbl">Lead · 400 · 19/1.55</div>
      <div class="pd-lead">Мы строим маршрут, контролируем склад, упаковку и документы — и доводим поставку до результата.</div>
    </div>
    <div>
      <div class="lbl">Body · 400 · 16/1.55</div>
      <div class="pd-body">Работаем с рынками России и СНГ, но особенно глубоко специализируемся на этих маршрутах.</div>
    </div>
  </div>
</body>
</html>
