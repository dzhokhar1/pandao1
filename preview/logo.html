<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>

  .half{flex:1;display:flex;align-items:center;justify-content:center;padding:30px;}

<body>
  <div class="half light"><img src="../assets/pandao-logo.png" alt="PanDao"></div>
