<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pd-dark);font-family:var(--pd-font);padding:22px;}
  .row{display:flex;gap:12px;}
  .sw{flex:1;border-radius:var(--pd-r-md);overflow:hidden;border:1px solid var(--pd-dark-line);}
  .chip{height:64px;}
  .meta{padding:9px 11px;background:var(--pd-dark-2);}
  .name{font-weight:700;font-size:12px;color:var(--pd-on-dark);}
  .hex{font-size:11px;color:var(--pd-on-dark-mut);margin-top:2px;}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--pd-dark)"></div><div class="meta"><div class="name">Dark surface</div><div class="hex">#14151A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--pd-dark-2)"></div><div class="meta"><div class="name">Dark tile</div><div class="hex">#1C1D22</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--pd-dark-line)"></div><div class="meta"><div class="name">Dark hairline</div><div class="hex">#2A2B31</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--pd-on-dark)"></div><div class="meta"><div class="name">On-dark text</div><div class="hex">#F4F4F5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--pd-red)"></div><div class="meta"><div class="name">Red on dark</div><div class="hex">#DE2931</div></div></div>
  </div>
</body>
</html>
