<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pd-bg);font-family:var(--pd-font);padding:24px;}
  .row{display:flex;gap:16px;align-items:flex-end;}
  .item{text-align:center;}
  .box{background:var(--pd-white);border:1px solid var(--pd-line);box-shadow:var(--pd-shadow-sm);width:84px;height:84px;}
  .nm{font-weight:700;font-size:12px;color:var(--pd-ink);margin-top:9px;}
  .vl{font-size:11px;color:var(--pd-muted);}
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--pd-r-sm)"></div><div class="nm">sm</div><div class="vl">10px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--pd-r-md)"></div><div class="nm">md</div><div class="vl">16px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--pd-r-lg)"></div><div class="nm">lg · cards</div><div class="vl">22px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--pd-r-xl)"></div><div class="nm">xl · hero</div><div class="vl">30px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--pd-r-pill);width:120px;"></div><div class="nm">pill</div><div class="vl">999px</div></div>
  </div>
</body>
</html>
