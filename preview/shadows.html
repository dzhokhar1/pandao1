<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pd-bg);font-family:var(--pd-font);padding:30px 24px;}
  .row{display:flex;gap:22px;}
  .item{text-align:center;flex:1;}
  .box{background:var(--pd-white);border-radius:var(--pd-r-lg);height:78px;}
  .nm{font-weight:700;font-size:12px;color:var(--pd-ink);margin-top:14px;}
  .vl{font-size:11px;color:var(--pd-muted);}
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--pd-shadow-sm)"></div><div class="nm">shadow-sm</div><div class="vl">cards at rest</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--pd-shadow-md)"></div><div class="nm">shadow-md</div><div class="vl">raised cards</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--pd-shadow-lg)"></div><div class="nm">shadow-lg</div><div class="vl">floating panels</div></div>
    <div class="item"><div class="box" style="background:var(--pd-red);box-shadow:var(--pd-shadow-red)"></div><div class="nm">shadow-red</div><div class="vl">CTA glow</div></div>
  </div>
</body>
</html>
