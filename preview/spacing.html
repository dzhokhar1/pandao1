<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pd-bg);font-family:var(--pd-font);padding:24px;}
  .row{display:flex;gap:10px;align-items:flex-end;}
  .item{text-align:center;}
  .bar{background:var(--pd-red);border-radius:3px;width:34px;}
  .nm{font-weight:700;font-size:11px;color:var(--pd-ink);margin-top:8px;}
  .vl{font-size:10px;color:var(--pd-muted);}
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="nm">s1</div><div class="vl">4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="nm">s2</div><div class="vl">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="nm">s3</div><div class="vl">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="nm">s4</div><div class="vl">16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="nm">s5</div><div class="vl">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="nm">s6</div><div class="vl">32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="nm">s7</div><div class="vl">48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="nm">s8</div><div class="vl">64</div></div>
    <div class="item"><div class="bar" style="height:96px"></div><div class="nm">s9</div><div class="vl">96</div></div>
  </div>
</body>
</html>
