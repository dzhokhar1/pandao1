<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Website" name="Website — Landing Page" subtitle="Full PanDao landing recreation (hero)" viewport="1280x900" -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PanDao Logistics — Доставка из Китая на Северный Кавказ</title>
<link rel="stylesheet" href="kit.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script type="text/babel" src="Decor.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Facts.jsx"></script>
<script type="text/babel" src="Results.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Warehouse.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  function App() {
    React.useEffect(() => {
      const tick = () => window.lucide && lucide.createIcons();
      tick();
      const id = setInterval(tick, 400);
      setTimeout(() => clearInterval(id), 2500);
      return () => clearInterval(id);
    }, []);
    return (
      <div className="pd-site">
        <Header />
        <Hero />
        <Services />
        <Warehouse />
        <Facts />
        <Results />
        <Footer />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
